name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/lapor-sampah
            git pull origin main
            docker rm -f aplikasi-lapor || true
            docker build -t web-lapor .
            docker run -d -p 80:80 --name aplikasi-lapor --restart always web-lapor
